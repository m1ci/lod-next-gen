name: Check URLs & Publish Knowledge Graphs

on:
  push:
    branches:
      - main
    paths:
      - "knowledge-graphs/**/*.yaml"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-publish:
    runs-on: ubuntu-latest

    env:
      KNOWLEDGE_GRAPH_CATALOG: ${{ secrets.KNOWLEDGE_GRAPH_CATALOG }}
      DEUTSCHE_NATBIB: ${{ secrets.DEUTSCHE_NATBIB }}
      MOSS_KG_CATALOG: ${{ secrets.MOSS_KG_CATALOG }}

    steps:

      # 1️⃣ Checkout the repository
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Set up Python
      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ Install dependencies
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests

      # 4️⃣ Validate YAML and check dataset URLs
      - name: Validate YAML & check dataset URLs
        run: |
          shopt -s globstar
          for f in knowledge-graphs/**/*.yaml; do
            echo "Checking $f"
            python scripts/check_url_update_yaml.py "$f"
          done

      # 5️⃣ Publish YAMLs to Databus (runs only if previous steps succeeded)
      - name: Publish all YAMLs to Databus
        if: ${{ success() }}
        run: |
          echo "Publishing YAMLs to Databus..."
          shopt -s globstar
          for f in knowledge-graphs/**/*.yaml; do
            echo "Publishing $f"
            python scripts/publish_to_databus_http.py "$f"
          done

      # 6️⃣ Publish metadata to MOSS
      - name: Publish metadata to MOSS
        if: ${{ success() }}
        run: |
          echo "Publishing YAMLs to MOSS..."
          shopt -s globstar
          for f in knowledge-graphs/**/*.yaml; do
            echo "Publishing $f"
            python scripts/publish_to_moss_http.py "$f"
          done

      # 7️⃣ Commit updated YAML back to repository
      - name: Commit YAML updates
        if: ${{ success() }}
        run: |
          git config user.name "LOD Cloud Bot"
          git config user.email "bot@lod-cloud.org"

          git add knowledge-graphs/**/*.yaml

          if git diff --cached --quiet; then
            echo "No YAML changes detected."
          else
            git commit -m "Update dataset status & Databus metadata"
            git push
          fi
