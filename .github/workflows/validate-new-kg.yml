name: Validate New KG Submission

on:
  issues:
    types: [opened, edited]

jobs:
  validate:
    if: contains(github.event.issue.labels.*.name, 'new-kg')
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pyyaml requests

      - name: Validate KG metadata
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          python scripts/validate_new_kg.py

      - name: Read validation status
        id: validation
        run: |
          echo "status=$(cat validation-status)" >> $GITHUB_OUTPUT

      - name: Comment validation result
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const message = fs.readFileSync(
              'validation-result.md',
              'utf8'
            );

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message
            });

      # Next step:
      # generate metadata.yaml if validation succeeds

      - name: Generate KG metadata
        if: steps.validation.outputs.status == 'success'
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python scripts/generate_metadata.py

      # Next step:
      # create pull request after metadata generation

      - name: Create Pull Request
        if: steps.validation.outputs.status == 'success'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Add new KG metadata"
          title: "Add new Knowledge Graph metadata"
          body: |
            Automatically generated from KG submission issue.

            Source issue:
            ${{ github.event.issue.html_url }}

          branch: new-kg-${{ github.event.issue.number }}
