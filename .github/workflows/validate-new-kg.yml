name: Validate New KG Submission

on:
  issues:
    types: [opened, edited]

jobs:
  validate:
    if: contains(github.event.issue.labels.*.name, 'new-kg')
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:

      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4


      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"


      # 3. Install dependencies
      - name: Install dependencies
        run: |
          pip install pyyaml requests


      # 4. Validate KG metadata
      - name: Validate KG metadata
        id: validation
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          python scripts/validate_new_kg.py


      # 5. Comment validation result on issue
      - name: Comment validation result
        uses: actions/github-script@v7
        env:
          MESSAGE: ${{ steps.validation.outputs.message }}
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: process.env.MESSAGE
            });


      # 6. Generate KG metadata.yaml
      # Only runs after successful validation
      - name: Generate KG metadata
        if: steps.validation.outputs.status == 'success'
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python scripts/generate_metadata.py


      # 7. Create pull request
      # Only runs after successful validation
      - name: Create Pull Request
        if: steps.validation.outputs.status == 'success'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}

          commit-message: "Register New Knowledge Graph: ${{ steps.validation.outputs.title }}"

          title: "Register New Knowledge Graph: ${{ steps.validation.outputs.title }}"

          body: |
            Automatically generated from KG submission issue.

            Source issue:
            ${{ github.event.issue.html_url }}

          branch: new-kg-${{ github.event.issue.number }}
