databus-account: knowledge-graph-catalog
id: sidekick
title: SIDEKICK
abstract: 'SIDEKICK is a biomedical knowledge graph that integrates drug indications,
  contraindications, and adverse reactions extracted from FDA Structured Product Labels.

  '
description: 'SIDEKICK is a semantically integrated biomedical knowledge graph for
  drug

  safety information. It contains indications, contraindications, adverse drug

  reactions, and drug interaction information extracted from more than 50,000

  FDA Structured Product Labels using a workflow combining Large Language Models

  (LLMs) and Graph Retrieval-Augmented Generation (Graph RAG).


  Clinical entities are normalized to established biomedical ontologies,

  including the Human Phenotype Ontology (HPO), MONDO Disease Ontology, and

  RxNorm. The dataset is represented as RDF using the Semanticscience Integrated

  Ontology (SIO) as an upper ontology, enabling semantic reasoning, SPARQL

  querying, and integration with other Semantic Web resources. The knowledge

  graph is intended to support pharmacovigilance, drug repurposing, and clinical

  decision support.

  '
