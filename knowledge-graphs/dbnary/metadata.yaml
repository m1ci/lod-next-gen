databus-account: knowledge-graph-catalog

id: dbnary

title: DBnary

abstract: DBnary provides multilingual lexical data extracted from Wiktionary and published as Linguistic Linked Open Data (LLOD). It includes lexical entries, forms, senses, translations, and linguistic relations represented using semantic web standards such as OntoLex-Lemon.

description: DBnary provides multilingual lexical data extracted from Wiktionary and published as Linguistic Linked Open Data (LLOD). It includes lexical entries, forms, senses, translations, and linguistic relations represented using semantic web standards such as OntoLex-Lemon.

