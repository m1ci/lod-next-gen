databus-account: knowledge-graph-catalog
id: dbnary
title: DBnary
abstract: DBnary provides multilingual lexical data extracted from Wiktionary and
  published as Linguistic Linked Open Data (LLOD). It includes lexical entries, forms,
  senses, translations, and linguistic relations represented using semantic web standards
  such as OntoLex-Lemon.
description: DBnary provides multilingual lexical data extracted from Wiktionary and
  published as Linguistic Linked Open Data (LLOD). It includes lexical entries, forms,
  senses, translations, and linguistic relations represented using semantic web standards
  such as OntoLex-Lemon.
homepage: https://kaiko.getalp.org
check-new-release: dbnary_release_auto_update.py
databus-publish: false
moss-publish: false
license: https://creativecommons.org/licenses/by-sa/3.0/rdf
keywords:
- linguistics
domains:
- Linguistics, Social & Digital Knowledge Systems
