description: 'The Computer Science Ontology (CSO) is a large-scale ontology of research
  areas that was automatically generated using the Klink-2 algorithm on the Rexplore
  dataset, which consists of about 16 million publications, mainly in the field of
  Computer Science. The Klink-2 algorithm combines semantic technologies, machine
  learning, and knowledge from external sources to automatically generate a fully
  populated ontology of research areas. Some relationships were also revised manually
  by experts during the preparation of two ontology-assisted surveys in the field
  of Semantic Web and Software Architecture. The main root of CSO is Computer Science,
  however, the ontology includes also a few secondary roots, such as Linguistics,
  Geometry, Semantics, and so on.


  CSO presents two main advantages over manually crafted categorisations used in Computer
  Science (e.g., 2012 ACM Classification, Microsoft Academic Search Classification).
  First, it can characterise higher-level research areas by means of hundreds of sub-topics
  and related terms, which enables to map very specific terms to higher-level research
  areas. Secondly, it can be easily updated by running Klink-2 on a set of new publications.
  A more comprehensive discussion of the advantages of adopting an automatically generated
  ontology in the scholarly domain can be found in.'
