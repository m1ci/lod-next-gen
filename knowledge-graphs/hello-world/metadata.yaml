databus-account: knowledge-graph-catalog
id: hello-world
title: Hello World
abstract: Hello World KG short description
description: '**Hello World Knowledge Graph** is a minimal example of graph-based
  data modeling. It shows how **entities (nodes)** and **relationships (edges)** represent
  structured information.


  **Overview**

  A small graph of people, places, and greetings.


  **Entities**

  - **Alice** (Person)

  - **Bob** (Person)

  - **Hello World** (Message)

  - **Prague** (City)


  **Relationships**

  - Alice **greets** Bob

  - Bob responds with "Hello World"

  - Alice **lives in** Prague

  - Bob **lives in** Prague

  '
